<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billiards Scoring</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="team-panel team-a">
            <div class="team-label">A</div>
            <div class="score" id="score-a">0</div>
            <div class="winner-message" id="winner-a" style="display: none;">
                Winner 🏆
            </div>
            <div class="numbers-grid" id="numbers-a">
                <!-- Number buttons will be generated by JavaScript -->
            </div>
            <button class="undo-btn" id="undo-a" onclick="undoScore('A')">Undo</button>
        </div>
        
        <div class="team-panel team-b">
            <div class="team-label">B</div>
            <div class="score" id="score-b">0</div>
            <div class="winner-message" id="winner-b" style="display: none;">
                Winner 🏆
            </div>
            <div class="numbers-grid" id="numbers-b">
                <!-- Number buttons will be generated by JavaScript -->
            </div>
            <button class="undo-btn" id="undo-b" onclick="undoScore('B')">Undo</button>
        </div>
    </div>
    
    <div class="reset-container">
        <button class="reset-btn" onclick="confirmReset()">Reset Match</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
